name: "Publish every Git push to main to FlakeHub"
on:
  push:
    branches:
      - "main"
    paths:
      - "**/*.nix"
      - "flake.lock"
jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919" # v3
      - uses: "DeterminateSystems/flakehub-push@52081fb4e8eb230b359aac958f5d4db8a16b40ad" # main
        with:
          name: "adampie/opt-out"
          rolling: true
          visibility: "public"
          include-output-paths: true
