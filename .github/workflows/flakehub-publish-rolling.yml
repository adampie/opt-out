name: "Publish every Git push to main to FlakeHub"
on:
  push:
    branches:
      - "main"
    paths:
      - "**/*.nix"
      - "flake.lock"
jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@1361e7900eb437fb341f0f226e8fbd9a0d8284fa" # v3
      - uses: "DeterminateSystems/flakehub-push@8bc0465e150974104887e9f43265c4c00ed8be11" # main
        with:
          name: "adampie/opt-out"
          rolling: true
          visibility: "public"
          include-output-paths: true
