---
name: "Update flake inputs"
"on":
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
jobs:
  update-flake-lock:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
      pull-requests: "write"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@1361e7900eb437fb341f0f226e8fbd9a0d8284fa" # v3
      - uses: "DeterminateSystems/update-flake-lock@3c4f567004c3b0f7bb85177df020f3825028d2b1" # main
        with:
          pr-title: "Update flake inputs"
          pr-assignees: "adampie"
